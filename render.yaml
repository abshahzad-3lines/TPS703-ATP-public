# Render Blueprint — one-click deployment for TPS-703 ATP
# https://render.com/docs/blueprint-spec
#
# Single Docker service: multi-stage Dockerfile builds the Vite frontend
# into the FastAPI backend's static/ dir, FastAPI serves both /api and
# the SPA. No separate frontend host needed.

services:
  - type: web
    name: tps703-atp
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_ENV
        value: production
      - key: DB_PATH
        value: /data/atp.db
      - key: CORS_ORIGINS
        value: https://tps703-atp.onrender.com
      # GROQ_API_KEY must be set manually via the Render dashboard or CLI
      # after the first deploy — it isn't in render.yaml because the file
      # is committed to git. The AI endpoints return 503 until it's set.
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
    disk:
      name: atp-data
      mountPath: /data
      sizeGB: 1
