# Render Blueprint — one-click deployment for TPS-703 ATP
# https://render.com/docs/blueprint-spec
#
# Single Docker service: multi-stage Dockerfile builds the Vite frontend
# into the FastAPI backend's static/ dir, FastAPI serves both /api and
# the SPA. No separate frontend host needed.

services:
  - type: web
    name: tps703-atp
    runtime: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    plan: free
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_ENV
        value: production
      # Supabase Postgres is the database. The schema + seed data live in
      # supabase/migrations/ and are applied via the Supabase CLI. The app is
      # stateless — nothing is stored in the container, so the free tier's
      # ephemeral filesystem is fine. Set DATABASE_URL to the Supabase
      # connection pooler DSN (transaction pooler / port 6543) in the Render
      # dashboard; it's a secret so it isn't committed here.
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://tps703-atp-cu9j.onrender.com
      # GROQ_API_KEY must be set manually via the Render dashboard or CLI
      # after the first deploy — it isn't in render.yaml because the file
      # is committed to git. The AI endpoints return 503 until it's set.
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
